<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa</title>
    <style>
        h1{ /*Box-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;
        

            border: 10px solid darkslategray;
            
            padding: 10 px;

            margin: 20px auto 40px auto;

            outline: 5px dashed salmon;
        }
        a{ /*Inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-left: 10px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos tambem são exemplos de box-leval, mas os <a href="#">Links também são exemplos de inline-leval</a> vamos ver como tudo isso funciona</p>
</body>
</html>

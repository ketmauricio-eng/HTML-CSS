<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML 5</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Tente abrir esse site em vario dispositivos diferentes ou simplesmente aumente e diminua o tamanho no seu navegador</p>
    <picture>
      <source media="(max-width: 750px)" srcset="Imagens/foto-p.png">
        <source media="(max-width: 1000px)" srcset="Imagens/foto-m.png">
        <img src="Imagens/foto-g.png" alt="imagem flexivel">  
    </picture>
    <h1>Reproduzindo Audio</h1>
    <p>Vamos repoduzir audio em HTML 5</p>
    <audio preload="metadata" autoplay controls loop>
        <Source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <p>Infelizmanete seu navegador não consgue reproduzir o audio</p>
    
    </audio>
    <!--MP3 WAV OGG-->
</body>
</html>

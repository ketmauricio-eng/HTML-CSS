<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos em HTML5</title>
</head>
<body>
    <h1>Inserindo videos Hospedados localmente</h1>
    <p>Este video esta hospedado no meu próprio servidor</p>
    <video width="560" poster="imagem/estadio.jpeg" controls autoplay loop>
        <source src="midia/Meu-Video.Mp4.mp4" type="video/mp4">
        <source src="midia/meu-video1.mp4.mp4" type="video/mp4">
        <source src="midia/Meu-Video.ogv.ogv" type="video/ogg">
        <source src="midia/Meu-Video.webm.webm" type="video/webm">
        <p>seu computador não tem compatibilidade com reprodução de video</p>
    </video>
    <h1>Inserindo videos do Youtube</h1>
  <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=8l5GLkHfhVWtnSwq" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
